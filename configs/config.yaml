defaults:
  - _self_

train:
  epochs: 100
  learning_rate: 1e-3
  normalize_data: true
  weight_decay: 1e-4
  gradient_clip_val: null
  early_stopping:
    patience: 30
    mode: min
    monitor: val/loss
  lambda_hierarchy: 0

paths:
  train_data: data/processed/train
  val_data: data/processed/val
  test_data: data/processed/test
  model_checkpoint: checkpoints/

random_seed: 42